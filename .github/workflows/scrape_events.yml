name: Scrape Events

on:
  schedule:
    # Runs at 00:00 every day
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual triggering for testing

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scraper/requirements.txt

      - name: Random Delay (Bot Detection Bypass)
        run: |
          # Wait for a random amount of time between 0 and 3600 seconds (1 hour)
          DELAY=$((RANDOM % 3600))
          echo "Waiting for $DELAY seconds before starting scraper..."
          sleep $DELAY

      - name: Setup Google Service Accounts
        run: |
          echo '${{ secrets.SERVICE_ACCOUNT_1 }}' > service-account.json
          echo '${{ secrets.SERVICE_ACCOUNT_2 }}' > service-account2.json
          echo '${{ secrets.SERVICE_ACCOUNT_3 }}' > service-account3.json
          echo '${{ secrets.SERVICE_ACCOUNT_4 }}' > service-account4.json
          echo '${{ secrets.SERVICE_ACCOUNT_5 }}' > service-account5.json

      - name: Run Scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          python scraper/main.py

      - name: Commit and push indexed URLs cache
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper/indexed_urls.txt
          if git diff --staged --quiet; then
            echo "No changes in indexed_urls.txt"
          else
            git commit -m "chore: update google indexer cache [skip ci]"
            git push
          fi
